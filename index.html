    let idCountMap = {};

    // カスタムドロップダウン状態（グローバル）
    const ddState = { region: '', country: '', heritage: '' };

    function getDDRegion()  { return ddState.region; }

    // 遺産マップと級カラー（グローバル）

    function ddOpen(listId) {
      ['region-list','country-list','heritage-list','grade-list'].forEach(id => {

          const el = document.getElementById(id);
          if (el) el.style.display = 'none';
        }

      const list = document.getElementById(listId);
      if (list) list.style.display = list.style.display === 'block' ? 'none' : 'block';

    function ddClose() {
      ['region-list','country-list','heritage-list','grade-list'].forEach(id => {

    // ============================================================
    // クラスタ・マーカー表示更新
    // ============================================================
    function refreshCluster() {
  if (!markerCluster) return;

  const visibleMarkers = markers.filter(m => m.map !== null);

  markerCluster.clearMarkers();
  markerCluster.addMarkers(visibleMarkers);
}

let lastBounds = null;

let clusterUpdateScheduled = false;

function scheduleClusterUpdate() {
  if (clusterUpdateScheduled) return;

  clusterUpdateScheduled = true;

  requestAnimationFrame(() => {
    refreshCluster();
    clusterUpdateScheduled = false;
  });
}


function boundsChangedSignificantly(newBounds) {
  if (!lastBounds) return true;

  const ne1 = lastBounds.getNorthEast();
  const sw1 = lastBounds.getSouthWest();
  const ne2 = newBounds.getNorthEast();
  const sw2 = newBounds.getSouthWest();

  const threshold = 0.05;

  return (
    Math.abs(ne1.lat() - ne2.lat()) > threshold ||
    Math.abs(ne1.lng() - ne2.lng()) > threshold ||
    Math.abs(sw1.lat() - sw2.lat()) > threshold ||
    Math.abs(sw1.lng() - sw2.lng()) > threshold
  );
}


function normalizeText(str) {
  if (!str) return '';
  return str
    .toLowerCase()
    .normalize('NFKC')
    .replace(/ヴ/g, 'ゔ')  // ヴはカタカナ範囲外なので個別変換
    .replace(/[ァ-ン]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0x60)
    );
}

function removeCircleNumber(str) {
  if (!str) return '';
  return str.replace(/\s*(（\d+\/\d+）|（\d+）|[①②③④⑤⑥⑦⑧⑨⑩]+)$/, '');
}


  function getCapitalLatLng(countryName) {

}

    };

    // ============================================================
    // CSVパーサー
    // ============================================================
    function parseCSVLine(text) {
      const result = [];
      let current = '';
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }

  tilt: 0,

});

      if (savedCenter && savedZoom) {

        map.setCenter(center);

      Promise.all([

])
.then(([placesCsv, countriesCsv]) => {

const countryRows = countriesCsv.trim().split('\n').slice(1);

const countryDisplayMap = {};  // ← グローバル変数に追加してもOK

countryRows.forEach(row => {
  const cols = parseCSVLine(row);
  const country     = cols[0]?.trim();

});

const rows = placesCsv.trim().split('\n').slice(1);
          
          const regionCountryMap = {};
          
// ★① 先にIDごとの総数をカウント
rows.forEach(row => {
  const columns = parseCSVLine(row);
  const id = columns[0].trim();
const country = columns[2].trim();
const key = `${country}_${id}`;

if (!idCountMap[key]) idCountMap[key] = 0;
idCountMap[key]++;
});





          const regionCountryIDsMap = {};


          // カタカナ→ひらがな変換

              String.fromCharCode(ch.charCodeAt(0) - 0x60)

          rows.forEach(row => {

  const id = columns[0].trim();
  const region = columns[1].trim();
  const country = columns[2].trim();
  const heritageName = columns[3].trim();

  const lng = parseFloat(columns[5]);
  const type = columns[6].trim();
  const rawYear = columns[7]?.trim() || "";

  const state = columns[8]?.trim();
  const localNameJP = columns[9]?.trim();      // 当地名（JP）
  const hira = columns[10]?.trim();            // hira
  const localLangName = columns[11]?.trim();   // ★当地名（当地言語）
  const localNameEN = columns[12]?.trim();     // 当地名（EN）
  const gradeRaw = columns[13]?.trim() || "";
  const imageUrl = columns[14]?.trim();
  const credit = columns[16]?.trim();
  const ddName = columns[17]?.trim() || "";  // ドロップダウン表示名（18列目）
  const suggestName = columns[18]?.trim() || "";  // 候補表示名（19列目）
  const num = columns[columns.length - 1];   

  // 複数級対応（内部はカンマで結合して保持）
  const gradeArray = gradeRaw.replace(/["']/g,'').split(/[、,／\/]/).map(g => g.trim()).filter(g => g!=='');
  const grade = gradeArray.join(',');

  heritageData.push({
  id, region, country, heritageName, lat, lng,
  type, year, localNameJP, hira, localLangName, localNameEN,
  grade, imageUrl, credit, ddName, suggestName,  // ← suggestName追加
  num
});

  // regionCountryMap
  if (!regionCountryMap[region]) regionCountryMap[region] = new Set();
  regionCountryMap[region].add(country);

  // countryHeritageMap: 同一IDはマージする（以前の仕様を維持）
  if (!countryHeritageMap[country]) countryHeritageMap[country] = {};
  if (!countryHeritageMap[country][id]) {
    countryHeritageMap[country][id] = { id, heritageName, grade, ddName, type };

    const prev = countryHeritageMap[country][id];

    prev.grade = Array.from(merged).join(',');
    if (!prev.ddName && ddName) prev.ddName = ddName;
  }

  globalUniqueIDs.add(id);

  if (!regionCountryIDsMap[region]) regionCountryIDsMap[region] = {};
  if (!regionCountryIDsMap[region][country]) regionCountryIDsMap[region][country] = new Set();
  regionCountryIDsMap[region][country].add(id);

  // マーカー生成（元の挙動を保持）
  const label = id.toString();
  const color = iconColors[type] || "gray";
const wrapper = document.createElement("div");

wrapper.style.width = "36px";
wrapper.style.height = "36px";
wrapper.style.display = "flex";
wrapper.style.alignItems = "center";
wrapper.style.justifyContent = "center";
wrapper.style.cursor = "pointer";

const markerEl = document.createElement("div");
markerEl.style.width = "28px";
markerEl.style.height = "28px";
markerEl.style.borderRadius = "50%";
markerEl.style.background = color;
markerEl.style.display = "flex";
markerEl.style.alignItems = "center";
markerEl.style.justifyContent = "center";
markerEl.style.color = "white";
markerEl.style.fontSize = "12px";
markerEl.style.border = "1px solid white";

markerEl.style.transform = "translateY(8px)";

wrapper.appendChild(markerEl);

const marker = new google.maps.marker.AdvancedMarkerElement({

  map,

});


const key = `${country}_${id}`;

marker.customData = {

  marker.addListener('click', () => {
  if (lastOpenedMarker === marker && isPinned) {
    if (infoWindow) {
      infoWindow.close();
      infoWindow = null;
      lastOpenedMarker = null;
      isPinned = false;
    }

marker.content.addEventListener("mouseenter", (e) => {
  if (isPinned) return;

  const data = marker.customData;

  tooltip.innerHTML =
  `${data.heritageName}
   ${data.localNameJP ? `<br>${data.localNameJP}` : ''}`;

marker.content.addEventListener("mousemove", (e) => {

});

 markers.push(marker);
 if (!markerIndex.has(key)) {

}

}); // rows.forEach

          // --- ここで regionCountryMap 内の国リストを「読み」でソートして置き換える ---
          for (const region in regionCountryMap) {
            if (regionCountryMap.hasOwnProperty(region)) {
              const sorted = Array.from(regionCountryMap[region]).sort((a, b) => {
                const ra = getReading(a);
                const rb = getReading(b);
                return ra.localeCompare(rb, 'ja');
              });
              regionCountryMap[region] = new Set(sorted);
            }
          }

          function countUniqueIDsInRegion(region) {
            if (!regionCountryIDsMap[region]) return 0;
            let sum = 0;
            Object.values(regionCountryIDsMap[region]).forEach(countrySet => {
              sum += countrySet.size;
            });
            return sum;
          }

          let allRegionsTotalCount = 0;
          Object.keys(regionCountryIDsMap).forEach(region => {
            allRegionsTotalCount += countUniqueIDsInRegion(region);
          });

          markerCluster = new markerClusterer.MarkerClusterer({
  map,
  markers,
  maxZoom: 10,
  onClusterClick: (event) => {
    // ★クラスタクリック完全無効化
    event.stop();
  }
});

function updateMarkers() {
  if (isSearchMode) return;

  const bounds = map.getBounds();
  if (!bounds) return;

  if (!boundsChangedSignificantly(bounds)) return;
  lastBounds = bounds;

  const selectedRegion = getDDRegion();
  const selectedCountry = getDDCountry();

  const buffer = 0.3;

  const extendedBounds = new google.maps.LatLngBounds(
    new google.maps.LatLng(
      bounds.getSouthWest().lat() - buffer,
      bounds.getSouthWest().lng() - buffer
    ),
    new google.maps.LatLng(
      bounds.getNorthEast().lat() + buffer,
      bounds.getNorthEast().lng() + buffer
    )
  );

  markers.forEach(marker => {
    const pos = marker.position;
    let shouldBeVisible = true;
    if (!extendedBounds.contains(pos)) shouldBeVisible = false;
    if (selectedRegion  && marker.customData.region  !== selectedRegion)  shouldBeVisible = false;
    if (selectedCountry && marker.customData.country !== selectedCountry) shouldBeVisible = false;
    marker.setVisible(shouldBeVisible);
  });

  scheduleClusterUpdate();
}

// 初回 + 地図操作後
google.maps.event.addListenerOnce(map, 'idle', updateMarkers);
let updateTimer = null;
map.addListener('idle', () => {
  if (updateTimer) clearTimeout(updateTimer);
  updateTimer = setTimeout(updateMarkers, 150);
});

          // ============================================================
          // カスタムドロップダウン
          // ============================================================

          // 状態管理はグローバルddStateを使用

          // 地域ドロップダウンのクリック

          document.getElementById('country-selected').addEventListener('click', () => {
            if (!ddState.region) return;
            ddOpen('country-list');
          });
          document.getElementById('heritage-selected').addEventListener('click', () => {
            if (!ddState.country) return;
            ddOpen('heritage-list');
          });

          document.addEventListener('click', e => {
  if (!e.target.closest('.dd-wrap') && !e.target.closest('.grade-box') && !e.target.closest('#image-modal') && !e.target.closest('#search-box')) ddClose();
  if (!e.target.closest('#search-box')) {

  }
});

          function getFlagEmojiFromName(countryName) {
            const code = countryCodeMap[countryName];
            if (!code) return "";
            return code.toUpperCase().split('')
              .map(char => 0x1F1E6 - 65 + char.charCodeAt(0))
              .map(cp => String.fromCodePoint(cp)).join('');
          }

          // 地域リスト構築
          function buildRegionList() {
            let allTotal = 0;
            Object.keys(regionCountryIDsMap).forEach(r => { allTotal += countUniqueIDsInRegion(r); });
            const regionNameMap = { "欧州": "ヨーロッパ" };
            document.getElementById('region-selected').textContent = `-- 地域を選択 -- (${allTotal})`;

            const list = document.getElementById('region-list');
            list.innerHTML = '';

            // 「すべて」項目
            const allItem = document.createElement('div');
            allItem.className = 'dd-item';
            allItem.textContent = `-- 地域を選択 -- (${allTotal})`;
            allItem.addEventListener('click', () => onRegionSelect(''));
            list.appendChild(allItem);

            Object.keys(regionCountryMap).forEach(region => {
              const item = document.createElement('div');
              item.className = 'dd-item';
              item.textContent = `${regionNameMap[region] || region} (${countUniqueIDsInRegion(region)})`;
              item.dataset.value = region;
              item.addEventListener('click', () => onRegionSelect(region));
              list.appendChild(item);
            });
          }

          // 地域選択
          function onRegionSelect(region) {
            ddClose();
            if (infoWindow) { infoWindow.close(); infoWindow = null; }
            lastOpenedMarker = null;
            ddState.region  = region;
            ddState.country = '';
            ddState.heritage = '';

            const regionNameMap = { "欧州": "ヨーロッパ" };
            const allTotal = Object.keys(regionCountryIDsMap).reduce((s, r) => s + countUniqueIDsInRegion(r), 0);
            document.getElementById('region-selected').textContent = region
              ? `${regionNameMap[region] || region} (${countUniqueIDsInRegion(region)})`
              : `-- 地域を選択 -- (${allTotal})`;
            document.getElementById('country-selected').textContent = '-- 国を選択 --';
            document.getElementById('heritage-selected').textContent = '-- 遺産を選択 --';
            document.getElementById('country-box').style.display  = region ? 'block' : 'none';
            document.getElementById('heritage-box').style.display = 'none';

            markers.forEach(m => {
              m.map = (!region || m.customData.region === region) ? map : null;
            });
            buildCountryList(region);
            refreshCluster();
          }

          // 国リスト構築
          function buildCountryList(region) {
            const list = document.getElementById('country-list');
            list.innerHTML = '';
            if (!region || !regionCountryMap[region]) return;
            Array.from(regionCountryMap[region]).forEach(country => {
              if (!country || !country.trim()) return;
              const idCount = regionCountryIDsMap[region][country]?.size || 0;
              const item = document.createElement('div');
              item.className = 'dd-item';
              const dispName = countryDisplayMap[country] || country;

// 検索機能
const searchInput = document.getElementById('search-input');
const clearBtn    = document.getElementById('search-clear');
const suggestBox  = document.getElementById('search-suggest');

function getScoredResults(keyword) {
  const hitMap = new Map();

  heritageData.forEach(d => {
    const targets = [d.heritageName, d.localNameJP, d.hira, d.localLangName, d.localNameEN, d.ddName, d.suggestName]
      .filter(Boolean)
      .map(v => normalizeText(v.replace(/<br\s*\/?>/gi, '')));
    let score = 0;
    let matched = false;
    targets.forEach(t => {
      if (t.startsWith(keyword) && !matched) { score += 100; matched = true; }
      else if (t.includes(keyword) && !matched) { score += 10; matched = true; }
    });
    if (score === 0) return;

    const hitFields = {};
    [
      ['heritageName', d.heritageName],
      ['localNameJP', d.localNameJP],
      ['hira', d.hira],
      ['localLangName', d.localLangName],
      ['localNameEN', d.localNameEN],
      ['ddName', d.ddName],
      ['suggestName', d.suggestName],
    ].forEach(([field, val]) => {
      if (val && normalizeText(val.replace(/<br\s*\/?>/gi,'')).includes(keyword)) {
        hitFields[field] = val;
      }
    });

    const key = `${d.country}_${d.id}`;
    const existing = hitMap.get(key);
    if (!existing) {
      hitMap.set(key, { data: d, score, hitFields });
    } else if (score > existing.score) {
      hitMap.set(key, { data: d, score, hitFields });
    } else if (score === existing.score && Number(d.num) < Number(existing.data.num)) {
      hitMap.set(key, { data: d, score, hitFields });
    }
  });

  return Array.from(hitMap.values())
    .sort((a, b) => {
  if (b.score !== a.score) return b.score - a.score;
  // ヒットした列をソートキーに使う
  const getKey = item => {
    const hf = item.hitFields;
    const d  = item.data;
    if (hf.suggestName)    return normalizeText(d.suggestName.replace(/<br\s*\/?>/gi,''));
    if (hf.ddName)         return normalizeText(d.ddName.replace(/<br\s*\/?>/gi,''));
    if (hf.heritageName)   return normalizeText(d.heritageName.replace(/<br\s*\/?>/gi,''));
    if (hf.localNameJP)    return normalizeText(d.localNameJP);
    if (hf.hira)           return normalizeText(d.hira);
    return normalizeText(d.heritageName || '');
  };
  return getKey(a).localeCompare(getKey(b), 'ja');
})
}

function highlightText(text, keyword) {
  if (!keyword || !text) return text || '';
  const idx = normalizeText(text).indexOf(normalizeText(keyword));
  if (idx === -1) return text;
  return text.slice(0, idx)
    + `<span style="color:#1a73e8;">${text.slice(idx, idx + keyword.length)}</span>`
    + text.slice(idx + keyword.length);
}

function showSuggests(keyword) {
  const searchInput = document.getElementById('search-input');
  const suggestBox  = document.getElementById('search-suggest');
  if (!keyword) { suggestBox.style.display = 'none'; return; }
  const allResults = getScoredResults(keyword).slice(0, 10);
  if (allResults.length === 0) { suggestBox.style.display = 'none'; return; }

  suggestBox.innerHTML = allResults.map((item, i) => {
    const d  = item.data;
    const kw = searchInput.value.trim();
    const hf = item.hitFields;

    let displayName;
    if (hf.suggestName)    displayName = d.suggestName;
    else if (hf.ddName)    displayName = d.ddName;
    else if (hf.heritageName) displayName = d.heritageName;
    else if (hf.localNameJP)  displayName = d.localNameJP;
    else if (hf.hira)         displayName = d.hira;
    else if (hf.localLangName) displayName = d.localLangName;
    else if (hf.localNameEN)   displayName = d.localNameEN;
    else displayName = d.suggestName || d.ddName || d.heritageName;

    const total = idCountMap[`${d.country}_${d.id}`] || 1;
    const isMainName = !!(hf.suggestName || hf.ddName || hf.heritageName);
    const numLabel = (total > 1 && isMainName && String(d.num) === '1') ? ` (1/${total})` : '';
    const displayFinal = (displayName || '').replace(/<br\s*\/?>/gi, '') + numLabel;

    return `<div class="suggest-item" onmousedown="handleSuggestClick(${i})" ontouchstart="touchStartY=event.touches[0].clientY" ontouchend="if(Math.abs(event.changedTouches[0].clientY-touchStartY)<10){event.preventDefault();handleSuggestClick(${i})}">
      <div class="suggest-item-name">${highlightText(displayFinal, kw)}</div>
      <div class="suggest-item-sub">${d.country} ／ ${d.type}</div>
    </div>`;
  }).join('');

  suggestBox._results = allResults.map(item => item.data);
  suggestBox.style.display = 'block';
}

searchInput.addEventListener('input', () => {
  clearBtn.style.display = searchInput.value ? 'block' : 'none';
  const keyword = normalizeText(searchInput.value.trim());
  if (!keyword) {
    suggestBox.style.display = 'none';
    if (infoWindow) { infoWindow.close(); infoWindow = null; }
    isSearchMode = false;
    lastOpenedMarker = null;
    const selectedRegion  = getDDRegion();
    const selectedCountry = getDDCountry();
    markers.forEach(m => {
      if (selectedCountry)     m.map = (m.customData.country === selectedCountry) ? map : null;
      else if (selectedRegion) m.map = (m.customData.region  === selectedRegion)  ? map : null;
      else                     m.map = map;
    });
    refreshCluster();
    return;
  }
  showSuggests(keyword);
});


searchInput.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const keyword = normalizeText(searchInput.value.trim());

  if (results.length === 0) return;

  jumpToHeritage(d.country, d.id, d.localNameJP, d.hira, d.heritageName);

    function buildHeritageList(country) {
      const list = document.getElementById('heritage-list');
      list.innerHTML = '';
      if (!country || !countryHeritageMap[country]) return;
      const heritages = Object.values(countryHeritageMap[country])
        .sort((a, b) => Number(a.id) - Number(b.id));
      heritages.forEach(({ id, heritageName, grade, ddName, type }) => {
        const displayName = ddName
          ? ddName
          : removeCircleNumber(heritageName.replace(/<br\s*\/?>/gi, ''));
        const grades = grade ? grade.split(',') : [];
        const item = document.createElement('div');
        item.className = 'dd-item';
        if (ddState.heritage === `${country}.${id}`) item.classList.add('active');
        if (selectedGrade !== '-' && grades.includes(selectedGrade)) {
          item.style.background = gradeColors[selectedGrade];
        }
        item.dataset.value = `${country}.${id}`;
        const badgeColor = iconColors[type] || 'gray';
item.innerHTML = `<span class="dd-item-badge" style="background:${badgeColor};">${id}</span><span class="dd-item-name">${displayName}</span>`;
        item.addEventListener('click', () => onHeritageSelect(`${country}.${id}`));
        list.appendChild(item);
      });
    }

    function onHeritageSelect(value) {
      const listEl = document.getElementById('region-list');
      ['region-list','country-list','heritage-list','grade-list'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      if (!value) return;
      const [country, id] = value.split('.');
      if (!country || !id) return;
      const targetMarker = markerIndex.get(`${country}_${id}`);
      if (!targetMarker) return;

      ddState.heritage = value;
      const heritage = countryHeritageMap[country][id];
      const displayName = heritage?.ddName
      ? heritage.ddName.replace(/<br\s*\/?>/gi, ' ')
      : removeCircleNumber((heritage?.heritageName || '').replace(/<br\s*\/?>/gi, ''));
      const badgeColor = iconColors[heritage?.type] || 'gray';
      document.getElementById('heritage-selected').innerHTML = `<span class="dd-item-badge" style="background:${badgeColor}; margin-right:4px;">${id}</span>${displayName}`;

      if (infoWindow) { infoWindow.close(); infoWindow = null; }
      lastOpenedMarker = null;

      markers.forEach(m => { m.map = (m.customData.country === country) ? map : null; });

      const latLng  = targetMarker.position;
      const offsetY = 150;
      const scale   = Math.pow(2, map.getZoom());
      const worldCoordinateCenter = map.getProjection().fromLatLngToPoint(latLng);
      const pixelOffset = new google.maps.Point(0, offsetY / scale);
      const newCenter   = map.getProjection().fromPointToLatLng(
        new google.maps.Point(worldCoordinateCenter.x, worldCoordinateCenter.y - pixelOffset.y)
      );
      map.panTo(newCenter);
      setTimeout(() => { showInfo(targetMarker, true); }, 200);
      refreshCluster();
    }

    function toggleGradeDD() {
      const list  = document.getElementById('grade-list');
      const hList = document.getElementById('heritage-list');
      hList.style.display = 'none';
      list.style.display  = list.style.display === 'block' ? 'none' : 'block';
    }

    function onGradeSelect(grade) {
      selectedGrade = grade;
      document.getElementById('grade-num').textContent = grade;
      document.getElementById('grade-list').style.display = 'none';
      document.querySelectorAll('.grade-list-item').forEach(el => {
        el.classList.toggle('active', el.dataset.grade === grade);

      const country = getDDCountry();
      if (country) buildHeritageList(country);

    document.getElementById('grade-selected').addEventListener('click', e => {
      e.stopPropagation();
      const list = document.getElementById('grade-list');
      const hList = document.getElementById('heritage-list');
      if (hList) hList.style.display = 'none';
      list.style.display = list.style.display === 'block' ? 'none' : 'block';
    });

    function openImageModal(src) {
      const modal    = document.getElementById("image-modal");
      const img      = document.getElementById("modal-img");
      const dropdown = document.getElementById("dropdown-container");
      modal.style.display    = "none";
      dropdown.style.display = "none";
      const tempImg = new Image();
      tempImg.onload  = () => { img.src = src; modal.style.display = "flex"; };
      tempImg.onerror = () => { img.src = src; modal.style.display = "flex"; };
      tempImg.src = src;
    }

    // モーダルを閉じる（initMapの外でDOMに直接登録）
    const _modal = document.getElementById("image-modal");
    if (_modal) {
      _modal.addEventListener("click", () => {
        _modal.style.display = "none";
        document.getElementById("dropdown-container").style.display = "block";
      });
    }

    function jumpToHeritage(country, id, targetLocalNameJP, targetHira, targetHeritageName) {
      const suggestBox = document.getElementById('search-suggest');
      suggestBox.style.display = 'none';
      const groupMarkers = markers.filter(m =>
        m.customData.id == id && m.customData.country == country
      );
      if (groupMarkers.length === 0) return;
      isSearchMode = true;
      markers.forEach(m => m.map = null);
      groupMarkers.forEach(m => m.map = map);
      refreshCluster();

      // localNameJP → hira → heritageName の順で完全一致検索
      const mainMarker =
        groupMarkers.find(m => targetLocalNameJP && m.customData.localNameJP === targetLocalNameJP) ||
        groupMarkers.find(m => targetHira && m.customData.hira === targetHira) ||
        groupMarkers.find(m => targetHeritageName && m.customData.heritageName === targetHeritageName) ||
        groupMarkers[0];

      const latLng  = mainMarker.position;
      const offsetY = 150;
      const scale   = Math.pow(2, map.getZoom());
      const worldCoordinateCenter = map.getProjection().fromLatLngToPoint(latLng);
      const pixelOffset = new google.maps.Point(0, offsetY / scale);
      const newCenter   = map.getProjection().fromPointToLatLng(
        new google.maps.Point(worldCoordinateCenter.x, worldCoordinateCenter.y - pixelOffset.y)
      );
      map.panTo(newCenter);
      setTimeout(() => { showInfo(mainMarker, true); }, 200);
    }

    function handleSuggestClick(index) {
      const suggestBox = document.getElementById('search-suggest');
      const results = suggestBox._results;
      if (!results || !results[index]) return;
      const d = results[index];
      isSearchMode = true;
      document.getElementById('search-input').blur();
      setTimeout(() => {
        jumpToHeritage(d.country, d.id, d.localNameJP, d.hira, d.heritageName);
      }, 50);
    }

    function clearSearch() {
      const searchInput = document.getElementById('search-input');
      const clearBtn    = document.getElementById('search-clear');
      const suggestBox  = document.getElementById('search-suggest');
      searchInput.value        = '';
      clearBtn.style.display   = 'none';
      suggestBox.style.display = 'none';
      if (infoWindow) { infoWindow.close(); infoWindow = null; }
      isSearchMode     = false;
      lastOpenedMarker = null;
      const selectedRegion  = getDDRegion();
      const selectedCountry = getDDCountry();
      markers.forEach(m => {
        if (selectedCountry)     m.map = (m.customData.country === selectedCountry) ? map : null;
        else if (selectedRegion) m.map = (m.customData.region  === selectedRegion)  ? map : null;
        else                     m.map = map;
      });
      refreshCluster();
    }
