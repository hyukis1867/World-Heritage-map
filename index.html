<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界遺産マップ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="map"></div>

  <div id="dropdown-container">
    <div id="region-box" style="margin-bottom: 2px;">
      <select id="region-select">
        <option value="">-- 地域を選択 --</option>
      </select>
    </div>
    <div id="country-box" style="display: none; margin-bottom: 2px;">
      <select id="country-select">
        <option value="">-- 国を選択 --</option>
      </select>
    </div>
    <div id="heritage-box" style="display: none;">
      <select id="heritage-select">
        <option value="">-- 遺産を選択 --</option>
      </select>
    </div>
    <div id="search-box" style="margin-top:6px; position:relative;">
  <input
    type="text"
    id="search-input"
    placeholder="🔍 キーワードで検索"
    style="font-size:14px; box-sizing:border-box; padding-right:28px;">
  <button id="search-clear" onclick="clearSearch()" style="
    display:none;
    position:absolute;
    right:4px; top:50%;
    transform:translateY(-50%);
    background:none; border:none;
    font-size:14px; color:#999;
    cursor:pointer; line-height:1;
    padding:2px 4px;">×</button>
  <div id="search-suggest"></div>
</div>
  </div>

  <script>
    // ============================================================
    // グローバル変数（状態管理）
    // ============================================================
    let map;
    let markers = [];
    let markerIndex = new Map();
    let infoWindow = null;
    let lastOpenedMarker = null;
    let heritageData = [];
    let markerCluster;
    let isPinned = false;
    let isSearchMode = false;
    let globalUniqueIDs = new Set();
    let idCountMap = {};
    let lastBounds = null;
    let clusterUpdateScheduled = false;
    let updateTimer = null;

    const countryCodeMap = {};
    const capitalMap = {};
    const countryReadingMap = {};

    const iconColors = {
      "文化遺産": "#F9A825",
      "自然遺産": "#2E7D32",
      "複合遺産": "deepskyblue"
    };

    // ツールチップ（グローバルに1つ）
    const tooltip = document.createElement("div");
    tooltip.style.cssText = [
      "position:absolute",
      "background:rgba(0,0,0,0.75)",
      "color:white",
      "padding:6px 10px",
      "border-radius:6px",
      "font-size:12px",
      "pointer-events:none",
      "z-index:1000",
      "white-space:normal",
      "display:none"
    ].join(";");
    document.body.appendChild(tooltip);


    // ============================================================
    // ユーティリティ関数
    // ============================================================

    function normalizeText(str) {
      if (!str) return '';
      return str
        .toLowerCase()
        .normalize('NFKC')
        .replace(/[ァ-ン]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    function removeCircleNumber(str) {
      if (!str) return '';
      return str.replace(/\s*(（\d+\/\d+）|（\d+）|[①②③④⑤⑥⑦⑧⑨⑩]+)$/, '');
    }

    function katakanaToHiragana(s) {
      return s.normalize('NFKC').replace(/[ァ-ン]/g, ch =>
        String.fromCharCode(ch.charCodeAt(0) - 0x60)
      );
    }

    function getReading(countryName) {
      return countryReadingMap[countryName] || countryName;
    }

    function getCapitalLatLng(countryName) {
      return capitalMap[countryName] || null;
    }

    function getFlagEmojiFromName(countryName) {
      const code = countryCodeMap[countryName];
      if (!code) return "";
      return code
        .toUpperCase()
        .split('')
        .map(char => 0x1F1E6 - 65 + char.charCodeAt(0))
        .map(cp => String.fromCodePoint(cp))
        .join('');
    }

    // ============================================================
    // CSVパーサー
    // ============================================================

    function parseCSVLine(text) {
      const result = [];
      let current = '';
      let insideQuotes = false;
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }

    /**
     * countries.csv を解析し、countryCodeMap / countryReadingMap / capitalMap を構築する
     */
    function parseCountriesCSV(csv) {
      const rows = csv.trim().split('\n').slice(1);
      rows.forEach(row => {
        const cols = parseCSVLine(row);
        const country = cols[0]?.trim();
        const code    = cols[1]?.trim();
        const reading = cols[2]?.trim();
        const lat     = parseFloat(cols[3]?.trim());
        const lng     = parseFloat(cols[4]?.trim());
        if (!country) return;
        countryCodeMap[country]    = code;
        countryReadingMap[country] = reading;
        if (!isNaN(lat) && !isNaN(lng)) {
          capitalMap[country] = { lat, lng };
        }
      });
    }

    /**
     * places.csv を解析し、heritageData 配列と各種インデックスを構築する
     * @returns {{ heritageData, regionCountryMap, countryHeritageMap, regionCountryIDsMap }}
     */
    function parsePlacesCSV(csv) {
      const rows = csv.trim().split('\n').slice(1);
      const localHeritageData      = [];
      const regionCountryMap       = {};
      const countryHeritageMap     = {};
      const regionCountryIDsMap    = {};

      // 1パス目：ID ごとの総数カウント
      rows.forEach(row => {
        const cols    = parseCSVLine(row);
        const id      = cols[0].trim();
        const country = cols[2].trim();
        const key     = `${country}_${id}`;
        if (!idCountMap[key]) idCountMap[key] = 0;
        idCountMap[key]++;
      });

      // 2パス目：データ整形・インデックス構築
      rows.forEach(row => {
        const cols        = parseCSVLine(row);
        const id          = cols[0].trim();
        const region      = cols[1].trim();
        const country     = cols[2].trim();
        const heritageName = cols[3].trim();
        const lat         = parseFloat(cols[4]);
        const lng         = parseFloat(cols[5]);
        const type        = cols[6].trim();
        const rawYear     = cols[7]?.trim() || "";
        const year        = rawYear.match(/\d{4}/) ? rawYear.match(/\d{4}/)[0] + "年" : rawYear;
        const state       = cols[8]?.trim();
        const localNameJP = cols[9]?.trim();
        const hira        = cols[10]?.trim();
        const localLangName = cols[11]?.trim();
        const localNameEN = cols[12]?.trim();
        const gradeRaw    = cols[13]?.trim() || "";
        const imageUrl    = cols[14]?.trim();
        const credit      = cols[16]?.trim();
        const num         = cols[cols.length - 1];

        const gradeArray = gradeRaw.replace(/["']/g, '').split(/[、,／\/]/).map(g => g.trim()).filter(g => g !== '');
        const grade = gradeArray.join(',');

        localHeritageData.push({
          id, region, country, heritageName, lat, lng,
          type, year, state, localNameJP, hira,
          localLangName, localNameEN, grade, imageUrl, credit, num
        });

        globalUniqueIDs.add(id);

        if (!regionCountryMap[region]) regionCountryMap[region] = new Set();
        regionCountryMap[region].add(country);

        if (!countryHeritageMap[country]) countryHeritageMap[country] = {};
        if (!countryHeritageMap[country][id]) {
          countryHeritageMap[country][id] = { id, heritageName, grade };
        } else {
          const prev = countryHeritageMap[country][id];
          const merged = new Set([
            ...(prev.grade ? prev.grade.split(',') : []),
            ...(grade ? grade.split(',') : [])
          ]);
          prev.grade = Array.from(merged).join(',');
        }

        if (!regionCountryIDsMap[region]) regionCountryIDsMap[region] = {};
        if (!regionCountryIDsMap[region][country]) regionCountryIDsMap[region][country] = new Set();
        regionCountryIDsMap[region][country].add(id);
      });

      // 国リストを読みでソート
      for (const region in regionCountryMap) {
        if (!regionCountryMap.hasOwnProperty(region)) continue;
        const sorted = Array.from(regionCountryMap[region]).sort((a, b) =>
          getReading(a).localeCompare(getReading(b), 'ja')
        );
        regionCountryMap[region] = new Set(sorted);
      }

      return { localHeritageData, regionCountryMap, countryHeritageMap, regionCountryIDsMap };
    }


    // ============================================================
    // クラスタ・マーカー表示更新
    // ============================================================

    function refreshCluster() {
      if (!markerCluster) return;
      const visibleMarkers = markers.filter(m => m.map !== null);
      markerCluster.clearMarkers();
      markerCluster.addMarkers(visibleMarkers);
    }

    function scheduleClusterUpdate() {
      if (clusterUpdateScheduled) return;
      clusterUpdateScheduled = true;
      requestAnimationFrame(() => {
        refreshCluster();
        clusterUpdateScheduled = false;
      });
    }

    function boundsChangedSignificantly(newBounds) {
      if (!lastBounds) return true;
      const ne1 = lastBounds.getNorthEast(), sw1 = lastBounds.getSouthWest();
      const ne2 = newBounds.getNorthEast(),  sw2 = newBounds.getSouthWest();
      const threshold = 0.05;
      return (
        Math.abs(ne1.lat() - ne2.lat()) > threshold ||
        Math.abs(ne1.lng() - ne2.lng()) > threshold ||
        Math.abs(sw1.lat() - sw2.lat()) > threshold ||
        Math.abs(sw1.lng() - sw2.lng()) > threshold
      );
    }

    function updateMarkers() {
      if (isSearchMode) return;
      const bounds = map.getBounds();
      if (!bounds) return;
      if (!boundsChangedSignificantly(bounds)) return;
      lastBounds = bounds;

      const selectedRegion  = document.getElementById('region-select').value;
      const selectedCountry = document.getElementById('country-select').value;
      const buffer = 0.3;
      const extendedBounds = new google.maps.LatLngBounds(
        new google.maps.LatLng(bounds.getSouthWest().lat() - buffer, bounds.getSouthWest().lng() - buffer),
        new google.maps.LatLng(bounds.getNorthEast().lat() + buffer, bounds.getNorthEast().lng() + buffer)
      );

      markers.forEach(marker => {
        const pos = marker.position;
        let shouldBeVisible = true;
        if (!extendedBounds.contains(pos)) shouldBeVisible = false;
        if (selectedRegion  && marker.customData.region  !== selectedRegion)  shouldBeVisible = false;
        if (selectedCountry && marker.customData.country !== selectedCountry) shouldBeVisible = false;
        marker.map = shouldBeVisible ? map : null;
      });

      scheduleClusterUpdate();
    }


    // ============================================================
    // InfoWindow 表示
    // ============================================================

    function showInfo(marker, pinned = false) {
      if (infoWindow) {
        infoWindow.close();
        infoWindow = null;
      }

      const data = marker.customData;
      if (!data) return;

      isPinned = pinned;

      const baseCDN  = "https://cdn.jsdelivr.net/gh/hyukis1867/World-Heritage-map@main";
      const fileName = data.imageUrl ? data.imageUrl.split('/').pop() : '';
      const country  = fileName.split("_")[0];
      const thumbUrl = fileName ? `${baseCDN}/images/thumb/${country}/${fileName}` : '';
      const fullUrl  = fileName ? `${baseCDN}/images/full/${country}/${fileName}`  : '';
      const numberLabel = data.num ? `（${data.num}/${data.total}）` : '';

      const contentHtml = `
<div>
  <strong>${data.heritageName}${numberLabel}</strong>
  ${data.state       ? `<div class="infowindow-state">${data.state}</div>`        : ''}
  ${data.localNameJP ? `<div class="infowindow-jp">${data.localNameJP}</div>`     : ''}
  ${(data.hira && !(data.country === "日本" && !data.localNameJP))
    ? `<div class="infowindow-hira">${data.hira}</div>` : ''}
  ${data.localLangName ? `<div class="infowindow-local">${data.localLangName}</div>` : ''}
  ${data.localNameEN   ? `<div class="infowindow-en">${data.localNameEN}</div>`      : ''}
  ${data.imageUrl ? `
    <div style="margin:6px 0; text-align:center;">
      <img src="${thumbUrl}"
        style="max-width:250px; width:auto; height:auto; border-radius:6px; cursor:pointer;"
        onclick="openImageModal('${fullUrl}')"
        onerror="this.src='${fullUrl}'">
    </div>` : ''}
  ${data.credit ? `<div class="infowindow-sub" style="font-size:75%; color:#777;">${data.credit}</div>` : ''}
  <div class="infowindow-sub">${data.country} / ${data.type} / ${data.year}</div>
</div>`;

      infoWindow = new google.maps.InfoWindow({
        pixelOffset: new google.maps.Size(0, -20),
        maxWidth: 280,
        disableAutoPan: true
      });
      infoWindow.setContent(contentHtml);
      infoWindow.setPosition(marker.position);
      infoWindow.open(map);
      lastOpenedMarker = marker;
    }


    // ============================================================
    // マーカー生成
    // ============================================================

    function buildMarkers(data) {
      data.forEach(item => {
        const { id, country, heritageName, lat, lng, type,
                year, state, localNameJP, hira, localLangName,
                localNameEN, grade, imageUrl, credit, num,
                region } = item;

        const color = iconColors[type] || "gray";

        const wrapper = document.createElement("div");
        wrapper.style.cssText = "width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;";

        const markerEl = document.createElement("div");
        markerEl.style.cssText = [
          "width:28px", "height:28px", "border-radius:50%",
          `background:${color}`, "display:flex", "align-items:center",
          "justify-content:center", "color:white", "font-size:12px",
          "border:1px solid white", "transform:translateY(8px)"
        ].join(";");
        markerEl.textContent = id.toString();
        wrapper.appendChild(markerEl);

        const marker = new google.maps.marker.AdvancedMarkerElement({
          position: { lat, lng },
          map,
          content: wrapper
        });

        const key = `${country}_${id}`;
        marker.customData = {
          id, region, country, heritageName, lat, lng,
          type, year, state, localNameJP, hira,
          localLangName, localNameEN, grade, imageUrl, credit,
          num, total: idCountMap[key]
        };

        marker.addListener('click', () => {
          if (lastOpenedMarker === marker && isPinned) {
            if (infoWindow) {
              infoWindow.close();
              infoWindow = null;
              lastOpenedMarker = null;
              isPinned = false;
            }
          } else {
            showInfo(marker, true);
          }
        });

        marker.content.addEventListener("mouseenter", () => {
          if (isPinned) return;
          tooltip.innerHTML = `${heritageName}${localNameJP ? `<br>${localNameJP}` : ''}`;
          tooltip.style.display = "block";
        });
        marker.content.addEventListener("mousemove", (e) => {
          tooltip.style.left = e.pageX + 10 + "px";
          tooltip.style.top  = e.pageY - 30 + "px";
        });
        marker.content.addEventListener("mouseleave", () => {
          tooltip.style.display = "none";
        });

        markers.push(marker);
        if (!markerIndex.has(key)) markerIndex.set(key, marker);
      });
    }


    // ============================================================
    // ドロップダウン構築・イベント登録
    // ============================================================

    function buildDropdowns(regionCountryMap, countryHeritageMap, regionCountryIDsMap) {

      function countUniqueIDsInRegion(region) {
        if (!regionCountryIDsMap[region]) return 0;
        return Object.values(regionCountryIDsMap[region]).reduce((s, set) => s + set.size, 0);
      }

      const regionSelect  = document.getElementById('region-select');
      const countrySelect = document.getElementById('country-select');
      const heritageSelect = document.getElementById('heritage-select');

      // 地域ドロップダウン初期化
      let allRegionsTotalCount = 0;
      Object.keys(regionCountryIDsMap).forEach(r => { allRegionsTotalCount += countUniqueIDsInRegion(r); });
      if (regionSelect.options.length > 0) {
        regionSelect.options[0].textContent = `-- 地域を選択 -- (${allRegionsTotalCount})`;
      }

      const regionNameMap = { "欧州": "ヨーロッパ" };
      Object.keys(regionCountryMap).forEach(region => {
        const option = document.createElement('option');
        option.value = region;
        option.textContent = `${regionNameMap[region] || region} (${countUniqueIDsInRegion(region)})`;
        regionSelect.appendChild(option);
      });

      countrySelect.disabled  = true;
      heritageSelect.disabled = true;

      // ---- 地域選択イベント ----
      regionSelect.addEventListener('change', () => {
        if (infoWindow) { infoWindow.close(); infoWindow = null; }
        lastOpenedMarker = null;

        const selectedRegion = regionSelect.value;
        markers.forEach(m => {
          m.map = (!selectedRegion || m.customData.region === selectedRegion) ? map : null;
        });

        countrySelect.innerHTML = '<option value="">-- 国を選択 --</option>';
        countrySelect.disabled  = !selectedRegion;
        document.getElementById("country-box").style.display  = selectedRegion ? "block" : "none";
        document.getElementById("heritage-box").style.display = "none";

        heritageSelect.innerHTML = '<option value="">-- 遺産を選択 --</option>';
        heritageSelect.disabled  = true;

        if (selectedRegion && regionCountryMap[selectedRegion]) {
          Array.from(regionCountryMap[selectedRegion]).forEach(country => {
            if (!country || !country.trim()) return;
            const option = document.createElement('option');
            const idCount = regionCountryIDsMap[selectedRegion][country]?.size || 0;
            option.value = country;
            option.textContent = `${getFlagEmojiFromName(country)} ${country} (${idCount})`;
            countrySelect.appendChild(option);
          });
        }

        heritageSelect.value = '';
        countrySelect.value  = '';
        refreshCluster();
      });

      // ---- 国選択イベント ----
      countrySelect.addEventListener('change', () => {
        if (infoWindow) { infoWindow.close(); infoWindow = null; }
        lastOpenedMarker = null;

        const selectedCountry = countrySelect.value;
        document.getElementById("heritage-box").style.display = selectedCountry ? "block" : "none";

        heritageSelect.innerHTML = '<option value="">-- 遺産を選択 --</option>';
        heritageSelect.disabled  = !selectedCountry;

        if (selectedCountry && countryHeritageMap[selectedCountry]) {
          const list = Object.values(countryHeritageMap[selectedCountry])
            .sort((a, b) => Number(a.id) - Number(b.id));
          list.forEach(({ id, heritageName, grade }) => {
            const option = document.createElement('option');
            option.value = `${selectedCountry}.${id}`;
            const gradeLabel = grade ? grade.split(',').map(g => `【${g}級】`).join('') : '';
            let displayName = removeCircleNumber(heritageName.replace(/<br\s*\/?>/gi, ''));
            if (displayName.length > 30) {
              displayName = displayName.slice(0, 15) + '…' + displayName.slice(-10);
            }
            option.textContent = `${id}｜${displayName} ${gradeLabel}`;
            heritageSelect.appendChild(option);
          });
        }

        if (selectedCountry) {
          markers.forEach(m => {
            m.map = (m.customData.country === selectedCountry) ? map : null;
          });
        } else {
          const selectedRegion = regionSelect.value;
          markers.forEach(m => {
            m.map = (!selectedRegion || m.customData.region === selectedRegion) ? map : null;
          });
        }

        heritageSelect.value = '';

        if (selectedCountry) {
          const capitalCoords = getCapitalLatLng(selectedCountry);
          if (capitalCoords) map.panTo(capitalCoords);
        }
        refreshCluster();
      });

      // ---- 遺産選択イベント ----
      heritageSelect.addEventListener('change', () => {
        const selectedHeritage = heritageSelect.value;
        if (!selectedHeritage) return;

        const [selectedCountry, id] = selectedHeritage.split('.');
        if (!selectedCountry || !id) return;

        const targetMarker = markerIndex.get(`${selectedCountry}_${id}`);
        if (!targetMarker) return;

        if (infoWindow) { infoWindow.close(); infoWindow = null; }
        lastOpenedMarker = null;

        markers.forEach(m => {
          m.map = (m.customData.country === selectedCountry) ? map : null;
        });

        const latLng = targetMarker.position;
        const offsetY = 150;
        const scale = Math.pow(2, map.getZoom());
        const worldCoordinateCenter = map.getProjection().fromLatLngToPoint(latLng);
        const pixelOffset = new google.maps.Point(0, offsetY / scale);
        const newCenter = map.getProjection().fromPointToLatLng(
          new google.maps.Point(worldCoordinateCenter.x, worldCoordinateCenter.y - pixelOffset.y)
        );
        map.panTo(newCenter);

        setTimeout(() => { showInfo(targetMarker, true); }, 200);
        refreshCluster();
      });
    }


    // ============================================================
    // 検索機能
    // ============================================================

   function clearSearch() {
  const searchInput = document.getElementById('search-input');
  const clearBtn    = document.getElementById('search-clear');
  const suggestBox  = document.getElementById('search-suggest');

  searchInput.value = '';
  clearBtn.style.display   = 'none';
  suggestBox.style.display = 'none';

  // 検索モード解除・マーカーを元の状態に戻す
  if (infoWindow) { infoWindow.close(); infoWindow = null; }
  isSearchMode = false;
  lastOpenedMarker = null;

  const selectedRegion  = document.getElementById('region-select').value;
  const selectedCountry = document.getElementById('country-select').value;
  markers.forEach(m => {
    if (selectedCountry) {
      m.map = (m.customData.country === selectedCountry) ? map : null;
    } else if (selectedRegion) {
      m.map = (m.customData.region === selectedRegion) ? map : null;
    } else {
      m.map = map;
    }
  });
  refreshCluster();
}

    function jumpToHeritage(country, id) {
      const suggestBox = document.getElementById('search-suggest');
      suggestBox.style.display = 'none';

      const groupMarkers = markers.filter(m =>
        m.customData.id == id && m.customData.country == country
      );
      if (groupMarkers.length === 0) return;

      isSearchMode = true;
      markers.forEach(m => m.map = null);
      groupMarkers.forEach(m => m.map = map);
      refreshCluster();

      const keyword = normalizeText(document.getElementById('search-input').value.trim());
      const mainMarker = groupMarkers.find(m =>
        [m.customData.heritageName, m.customData.localNameJP,
         m.customData.hira, m.customData.localLangName, m.customData.localNameEN]
          .some(v => v && normalizeText(v).includes(keyword))
      ) || groupMarkers[0];

      const latLng = mainMarker.position;
      const offsetY = 150;
      const scale = Math.pow(2, map.getZoom());
      const worldCoordinateCenter = map.getProjection().fromLatLngToPoint(latLng);
      const pixelOffset = new google.maps.Point(0, offsetY / scale);
      const newCenter = map.getProjection().fromPointToLatLng(
        new google.maps.Point(worldCoordinateCenter.x, worldCoordinateCenter.y - pixelOffset.y)
      );
      map.panTo(newCenter);
      setTimeout(() => { showInfo(mainMarker, true); }, 200);
    }

    function setupSearch() {
      const searchInput = document.getElementById('search-input');
      const clearBtn    = document.getElementById('search-clear');
      const suggestBox  = document.getElementById('search-suggest');

      function getScoredResults(keyword) {
        return heritageData
          .map(d => {
            const targets = [d.heritageName, d.localNameJP, d.hira, d.localLangName, d.localNameEN]
              .filter(Boolean).map(normalizeText);
            let score = 0;
            targets.forEach(t => {
              if (t.startsWith(keyword)) score += 100;
              else if (t.includes(keyword)) score += 10;
            });
            return { data: d, score };
          })
          .filter(item => item.score > 0)
          .sort((a, b) => b.score - a.score)
          .map(item => item.data);
      }

      function highlightText(text, keyword) {
        if (!keyword || !text) return text || '';
        const normalized = normalizeText(text);
        const idx = normalized.indexOf(keyword);
        if (idx === -1) return text;
        return text.slice(0, idx)
          + `<span style="color:#1a73e8;font-weight:bold;">${text.slice(idx, idx + keyword.length)}</span>`
          + text.slice(idx + keyword.length);
      }

      function showSuggests(keyword) {
        if (!keyword) { suggestBox.style.display = 'none'; return; }
        const results = getScoredResults(keyword).slice(0, 5);
        if (results.length === 0) { suggestBox.style.display = 'none'; return; }

        suggestBox.innerHTML = results.map(d => {
          const displayName = d.localNameJP || d.heritageName;
          return `<div class="suggest-item"
            onmousedown="jumpToHeritage('${d.country.replace(/'/g,"\\'")}', '${d.id}')">
            <div class="suggest-item-name">${highlightText(displayName, searchInput.value.trim())}</div>
            <div class="suggest-item-sub">${d.country} ／ ${d.type}</div>
          </div>`;
        }).join('');
        suggestBox.style.display = 'block';
      }

      searchInput.addEventListener('input', () => {
        clearBtn.style.display = searchInput.value ? 'block' : 'none';
        const keyword = normalizeText(searchInput.value.trim());
        if (!keyword) {
          suggestBox.style.display = 'none';
          if (infoWindow) { infoWindow.close(); infoWindow = null; }
          isSearchMode = false;
          lastOpenedMarker = null;
          const selectedRegion  = document.getElementById('region-select').value;
          const selectedCountry = document.getElementById('country-select').value;
          markers.forEach(m => {
            if (selectedCountry)     m.map = (m.customData.country === selectedCountry) ? map : null;
            else if (selectedRegion) m.map = (m.customData.region  === selectedRegion)  ? map : null;
            else                     m.map = map;
          });
          refreshCluster();
          return;
        }
        showSuggests(keyword);
      });

      // フォーカスが外れたら候補を閉じる（mousedownでjumpした後はblurより先に実行される）
      searchInput.addEventListener('blur', () => {
        setTimeout(() => { suggestBox.style.display = 'none'; }, 150);
      });

      searchInput.addEventListener('keydown', (e) => {
        if (e.key !== 'Enter') return;
        const keyword = normalizeText(searchInput.value.trim());
        if (!keyword) return;
        suggestBox.style.display = 'none';
        const results = getScoredResults(keyword);
        if (results.length === 0) return;
        jumpToHeritage(results[0].country, results[0].id);
      });
    }


    // ============================================================
    // initMap（司令塔）
    // ============================================================

    window.initMap = function () {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 41.9028, lng: 12.4964 },
        zoom: 12,
        gestureHandling: 'greedy',
        tilt: 0,
        mapId: "d4813258172c17d21338d573",
        mapTypeControl: false,
        streetViewControl: false
      });

      // 位置の復元
      const savedCenter = localStorage.getItem('mapCenter');
      const savedZoom   = localStorage.getItem('mapZoom');
      if (savedCenter && savedZoom) {
        map.setCenter(JSON.parse(savedCenter));
        map.setZoom(parseInt(savedZoom));
      }

      // 位置の保存
      map.addListener('center_changed', () => {
        localStorage.setItem('mapCenter', JSON.stringify(map.getCenter().toJSON()));
      });
      map.addListener('zoom_changed', () => {
        localStorage.setItem('mapZoom', map.getZoom());
      });

      // URLパラメータによる初期位置指定
      const urlParams = new URLSearchParams(window.location.search);
      const urlLat  = parseFloat(urlParams.get('lat'));
      const urlLng  = parseFloat(urlParams.get('lng'));
      const urlZoom = parseInt(urlParams.get('zoom'));
      if (!isNaN(urlLat) && !isNaN(urlLng) && !isNaN(urlZoom)) {
        map.setCenter({ lat: urlLat, lng: urlLng });
        map.setZoom(urlZoom);
      }

      // データ読み込み → 各機能を初期化
      Promise.all([
        fetch('places.csv').then(r => r.text()),
        fetch('countries.csv').then(r => r.text())
      ]).then(([placesCsv, countriesCsv]) => {

        // 1. 国データを解析
        parseCountriesCSV(countriesCsv);

        // 2. 遺産データを解析
        const { localHeritageData, regionCountryMap, countryHeritageMap, regionCountryIDsMap }
          = parsePlacesCSV(placesCsv);
        heritageData = localHeritageData;

        // 3. マーカー生成
        buildMarkers(heritageData);

        // 4. クラスタ初期化
        markerCluster = new markerClusterer.MarkerClusterer({
          map,
          markers,
          maxZoom: 10,
          onClusterClick: (event) => { event.stop(); }
        });

        // 5. ドロップダウン構築・イベント登録
        buildDropdowns(regionCountryMap, countryHeritageMap, regionCountryIDsMap);

        // 6. 検索機能セットアップ
        setupSearch();

        // 7. 地図表示更新リスナー
map.addListener('idle', () => {
  if (updateTimer) clearTimeout(updateTimer);
  updateTimer = setTimeout(updateMarkers, 150);
});
      });
    };


    // ============================================================
    // 画像モーダル
    // ============================================================

    function openImageModal(src) {
  const modal    = document.getElementById("image-modal");
  const img      = document.getElementById("modal-img");
  const dropdown = document.getElementById("dropdown-container");

  modal.style.display = "none";
  dropdown.style.display = "none";

  const tempImg = new Image();
  tempImg.onload = () => {
    img.src = src;
    modal.style.display = "flex";
  };
  tempImg.onerror = () => {
    img.src = src;
    modal.style.display = "flex";
  };
  tempImg.src = src;
}

    document.addEventListener("DOMContentLoaded", () => {
      const modal = document.getElementById("image-modal");
      if (modal) {
        modal.addEventListener("click", () => {
  modal.style.display = "none";
  document.getElementById("dropdown-container").style.display = "block"; // ← 追加
});
      }
    });
  </script>

  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCZPRJzf-rbyrdjWjmJYWYpb74dnfLjkHw&libraries=marker&callback=initMap">
  </script>

  <div id="image-modal" style="
    display:none;
    position:fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    z-index:9999;
    justify-content:center;
    align-items:center;">
    <span id="modal-close" style="
      position:absolute;
      top:20px; right:30px;
      font-size:30px;
      color:white;
      cursor:pointer;">×</span>
    <img id="modal-img" style="
      max-width:90%;
      max-height:90%;
      border-radius:8px;
      box-shadow:0 0 20px rgba(0,0,0,0.5);">
  </div>
