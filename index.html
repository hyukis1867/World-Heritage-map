function refreshCluster() {
  if (!markerCluster) return;

  const visibleMarkers = markers.filter(m => m.map !== null);

  markerCluster.clearMarkers();
  markerCluster.addMarkers(visibleMarkers);
}

let lastBounds = null;

let clusterUpdateScheduled = false;

function scheduleClusterUpdate() {
  if (clusterUpdateScheduled) return;

  clusterUpdateScheduled = true;

  requestAnimationFrame(() => {
    refreshCluster();
    clusterUpdateScheduled = false;
  });
}


function boundsChangedSignificantly(newBounds) {
  if (!lastBounds) return true;

  const ne1 = lastBounds.getNorthEast();
  const sw1 = lastBounds.getSouthWest();
  const ne2 = newBounds.getNorthEast();
  const sw2 = newBounds.getSouthWest();

  const threshold = 0.05;

  return (
    Math.abs(ne1.lat() - ne2.lat()) > threshold ||
    Math.abs(ne1.lng() - ne2.lng()) > threshold ||
    Math.abs(sw1.lat() - sw2.lat()) > threshold ||
    Math.abs(sw1.lng() - sw2.lng()) > threshold
  );
}


function normalizeText(str) {
  if (!str) return '';

  return str
    .toLowerCase()
    .normalize('NFKC') // 全角→半角など
    .replace(/[ァ-ン]/g, ch =>
      String.fromCharCode(ch.charCodeAt(0) - 0x60)
    ); // カタカナ→ひらがな
}

function removeCircleNumber(str) {
  if (!str) return '';
  return str.replace(/\s*(（\d+\/\d+）|（\d+）|[①②③④⑤⑥⑦⑧⑨⑩]+)$/, '');
}

    // ▼ 安全なCSV1行パーサー（ダブルクオート対応）
    function parseCSVLine(text) {
      const result = [];
      let current = '';
      let insideQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === ',' && !insideQuotes) {
          result.push(current.trim());
          current = '';
        } else {
          current += char;
        }
      }
      result.push(current.trim());
      return result;
    }

          // --- ここで regionCountryMap 内の国リストを「読み」でソートして置き換える ---

          function countUniqueIDsInRegion(region) {

function updateMarkers() {
  if (isSearchMode) return;

  const bounds = map.getBounds();
  if (!bounds) return;

  if (!boundsChangedSignificantly(bounds)) return;
  lastBounds = bounds;

  const selectedRegion = document.getElementById('region-select').value;
  const selectedCountry = document.getElementById('country-select').value;

  const buffer = 0.3;

  const extendedBounds = new google.maps.LatLngBounds(
    new google.maps.LatLng(
      bounds.getSouthWest().lat() - buffer,
      bounds.getSouthWest().lng() - buffer
    ),
    new google.maps.LatLng(
      bounds.getNorthEast().lat() + buffer,
      bounds.getNorthEast().lng() + buffer
    )
  );

  markers.forEach(marker => {
  const pos = marker.position;

  let shouldBeVisible = true;

  if (!extendedBounds.contains(pos)) shouldBeVisible = false;

  if (selectedRegion && marker.customData.region !== selectedRegion) {
    shouldBeVisible = false;
  }

  if (selectedCountry && marker.customData.country !== selectedCountry) {
    shouldBeVisible = false;
  }

  // ★ここが変更点
  marker.setVisible(shouldBeVisible);
});

  scheduleClusterUpdate();
}

            map.setCenter({ lat: urlLat, lng: urlLng });

          }

         
// 🔍 検索機能（ここに入れる）
const searchInput = document.getElementById('search-input');

// 入力中は何もしない（必要なら候補表示だけ）
searchInput.addEventListener('input', () => {
  const keyword = normalizeText(searchInput.value.trim());

  if (!keyword) {
    if (infoWindow) {
      infoWindow.close();
      infoWindow = null;
      isSearchMode = false; // ★これ追加
    }
    lastOpenedMarker = null;

    // ★ここ追加（状態取得）
    const selectedRegion = document.getElementById('region-select').value;
    const selectedCountry = document.getElementById('country-select').value;

markers.forEach(m => {
  if (selectedCountry) {
    m.map = (m.customData.country === selectedCountry) ? map : null;
  } else if (selectedRegion) {
    m.map = (m.customData.region === selectedRegion) ? map : null;
  } else {
    m.map = map;
  }
});

    refreshCluster();
  }
});

// Enterキーで検索実行
searchInput.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;

  const keyword = normalizeText(searchInput.value.trim());
  if (!keyword) return;

  const results = heritageData
  .map(d => {
    const targets = [
      d.heritageName,
      d.localNameJP,
      d.hira,
      d.localLangName,
      d.localNameEN
    ]
      .filter(Boolean)
      .map(normalizeText);

    let score = 0;

    targets.forEach(t => {
      if (t.startsWith(keyword)) {
        score += 100;   // ★前方一致を最優先
      } else if (t.includes(keyword)) {
        score += 10;    // ★部分一致は弱く
      }
    });

    return { data: d, score };
  })
  .filter(item => item.score > 0)
  .sort((a, b) => b.score - a.score)
  .map(item => item.data);

  if (results.length === 0) return;

  const found = results[0];

  const groupMarkers = markers.filter(m =>
    m.customData.id == found.id &&
    m.customData.country == found.country
  );

  if (groupMarkers.length === 0) return;

  isSearchMode = true;

  markers.forEach(m => m.map = null);
  groupMarkers.forEach(m => m.map = map);

  refreshCluster();

  const mainMarker =
  groupMarkers.find(m =>
    (m.customData.heritageName && normalizeText(m.customData.heritageName).includes(keyword)) ||
    (m.customData.localNameJP && normalizeText(m.customData.localNameJP).includes(keyword)) ||
    (m.customData.hira && normalizeText(m.customData.hira).includes(keyword)) ||                // ←追加
    (m.customData.localLangName && normalizeText(m.customData.localLangName).includes(keyword)) || // ←追加
    (m.customData.localNameEN && normalizeText(m.customData.localNameEN).includes(keyword))
  ) || groupMarkers[0];

  const latLng = mainMarker.position;

const offsetY = 150; // ←プルダウンと同じ値にする

const scale = Math.pow(2, map.getZoom());
const worldCoordinateCenter = map.getProjection().fromLatLngToPoint(latLng);
const pixelOffset = new google.maps.Point(0, offsetY / scale);

const newCenter = map.getProjection().fromPointToLatLng(
  new google.maps.Point(
    worldCoordinateCenter.x,
    worldCoordinateCenter.y - pixelOffset.y
  )
);

map.panTo(newCenter);

  setTimeout(() => {
    showInfo(mainMarker, true); // ← ここ重要（固定表示）
  }, 200);
});

        });
    }

  modal.style.display = "none";

  const tempImg = new Image();
  tempImg.onload = () => {
    img.src = src;
    modal.style.display = "flex";
  };
  tempImg.src = src;
}

    });
